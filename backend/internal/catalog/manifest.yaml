# Curated subset of community-scripts/ProxmoxVE (formerly tteck) install scripts.
# script_url MUST be a raw URL from that repo — it is the only thing fed to the
# shell, looked up server-side by id, never taken from the client. Keep this
# list small and hand-vetted: every entry here is run as root on the host.
- id: pihole
  name: Pi-hole
  description: Network-wide ad blocking via a local DNS sinkhole.
  category: Networking
  script_url: https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/pihole.sh
  warnings:
    - Creates a new LXC
    - Requires root

- id: adguard
  name: AdGuard Home
  description: Network-wide ad & tracker blocking DNS server with a web UI.
  category: Networking
  script_url: https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/adguard.sh
  warnings:
    - Creates a new LXC
    - Requires root

- id: nginxproxymanager
  name: Nginx Proxy Manager
  description: Reverse proxy with a web UI and free Let's Encrypt certificates.
  category: Networking
  script_url: https://raw.githubusercontent.com/community-scripts/ProxmoxVE/main/ct/nginxproxymanager.sh
  warnings:
    - Creates a new LXC
    - Requires root

- id: uptimekuma
  name: Uptime Kuma
  description: Self-hosted uptime monitoring with status pages and alerts.
